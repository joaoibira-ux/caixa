<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Caixa" />
  <title>Caixa</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=14" />
</head>
<body>

<header>Caixa</header>

<div class="totals">
  <div class="item">
    <div class="label">Entradas</div>
    <div class="value entrada" id="tot-entrada">R$ 0,00</div>
  </div>
  <div class="item">
    <div class="label">Saídas</div>
    <div class="value saida" id="tot-saida">R$ 0,00</div>
  </div>
  <div class="item">
    <div class="label">Saldo</div>
    <div class="value saldo-pos" id="tot-saldo">R$ 0,00</div>
  </div>
</div>
<div class="totals-sub">
  <div class="item">
    <div class="label">CEF (ANE)</div>
    <div class="value saldo-pos" id="tot-cef">R$ 0,00</div>
  </div>
  <div class="item inter-row">
    <div class="label">INTER (JOAO)</div>
    <div class="value saldo-pos" id="tot-inter">R$ 0,00</div>
  </div>
  <button class="fab" id="fab" onclick="toggleForm()">+</button>
</div>

<form class="form-card" id="form" novalidate style="display:none">
  <h3>Novo lançamento</h3>
  <div class="form-grid">
    <div>
      <label for="f-data">Data</label>
      <input type="text" id="f-data" placeholder="DD/MM/AAAA" />
    </div>
    <div>
      <label for="f-origem">Origem</label>
      <select id="f-origem">
        <option value="ANE">ANE</option>
        <option value="JOAO">JOAO</option>
        <option value="ANE->JOAO">ANE → JOAO</option>
      </select>
    </div>
    <div class="full">
      <label for="f-desc">Descrição</label>
      <input type="text" id="f-desc" placeholder="Ex: Compra mercado" />
    </div>
    <div>
      <label for="f-entrada">Entrada (R$)</label>
      <input type="decimal" inputmode="decimal" id="f-entrada" placeholder="0,00" />
    </div>
    <div>
      <label for="f-saida">Saída (R$)</label>
      <input type="decimal" inputmode="decimal" id="f-saida" placeholder="0,00" />
    </div>
    <button type="submit" class="btn-add">+ Adicionar</button>
  </div>
</form>

<div class="modal-overlay" id="modal-del" style="display:none">
  <div class="modal">
    <h3>Excluir lançamento?</h3>
    <div class="modal-detalhe" id="modal-detalhe"></div>
    <label for="modal-senha">Digite a senha para confirmar</label>
    <input type="password" id="modal-senha" placeholder="••••" maxlength="4" inputmode="numeric" />
    <p class="modal-erro" id="modal-erro"></p>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-excluir" onclick="confirmarDelete()">Excluir</button>
    </div>
  </div>
</div>

<p class="section-title">Lançamentos</p>
<div class="lancamentos" id="lista" style="padding-bottom: env(safe-area-inset-bottom)"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="./app.js?v=13"></script>
</body>
</html>
