<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Reset Backup</title>
</head>
<body>
  <p id="status">Resetando controle de backup...</p>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBaqROPsywPgtKjQU7cs1ke1WaqDFhWwn0",
      authDomain: "sistema-gw-36566.firebaseapp.com",
      projectId: "sistema-gw-36566",
      storageBucket: "sistema-gw-36566.firebasestorage.app",
      messagingSenderId: "472820177992",
      appId: "1:472820177992:web:2e1b98c9f6ac3a823d0c7d"
    });
    firebase.firestore()
      .collection("config").doc("backupDiario")
      .set({ ultimaData: "" })
      .then(() => {
        document.getElementById("status").textContent = "✅ Pronto! Abra o Caixa agora para disparar a mensagem.";
      })
      .catch(e => {
        document.getElementById("status").textContent = "❌ Erro: " + e.message;
      });
  </script>
</body>
</html>
